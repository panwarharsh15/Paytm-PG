version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT docker-compose
# Usage:
#   docker-compose up -d          → start everything
#   docker-compose logs -f api    → tail backend logs
#   docker-compose down -v        → stop + delete volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: paytm-pg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paytm_pg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paytm-network

  # ── Redis (rate limiting + caching) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: paytm-pg-redis
    restart: unless-stopped
    command: redis-server --requirepass redispassword --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - paytm-network

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for dev (has shell, easier debugging)
    container_name: paytm-pg-api
    restart: unless-stopped
    command: go run ./cmd/server
    env_file:
      - .env
    environment:
      APP_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redispassword
    ports:
      - "8080:8080"
    volumes:
      - .:/build  # hot reload via Air (see below)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - paytm-network
    labels:
      - "traefik.enable=true"

  # ── pgAdmin (database UI) ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: paytm-pg-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@paytm-pg.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - paytm-network
    profiles:
      - tools  # Only start with: docker-compose --profile tools up

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: paytm-pg-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - paytm-network
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: paytm-pg-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - paytm-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  paytm-network:
    driver: bridge
